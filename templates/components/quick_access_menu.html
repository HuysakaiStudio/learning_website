<div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-3 my-4 py-3 px-2 bg-light rounded-4">
    {% if cau_hoi %}
    <div class="col">
      <a href="{% url 'de_thi:danh_sach_forum' cau_hoi.id %}" class="quick-access-card text-white d-flex flex-column align-items-center justify-content-center text-center text-decoration-none h-100">
        <div class="quick-access-icon bg-primary text-white mb-2">💬</div>
        <div class="fw-semibold">Thảo luận</div>
      </a>
    </div>
    {% endif %}
    <div class="col">
      <a href="/kien-thuc/flashcard/" class="quick-access-card text-white d-flex flex-column align-items-center justify-content-center text-center text-decoration-none h-100">
        <div class="quick-access-icon bg-info text-white mb-2">🎴</div>
        <div class="fw-semibold">Flashcard</div>
      </a>
    </div>
    <div class="col">
      <a href="/leaderboard/" class="quick-access-card text-white d-flex flex-column align-items-center justify-content-center text-center text-decoration-none h-100">
        <div class="quick-access-icon bg-warning text-white mb-2">🏆</div>
        <div class="fw-semibold">Xếp hạng</div>
      </a>
    </div>
    {% if user.is_authenticated %}
    <div class="col">
      <a href="/de-thi/phan-tich/" class="quick-access-card text-white d-flex flex-column align-items-center justify-content-center text-center text-decoration-none h-100">
        <div class="quick-access-icon bg-success text-white mb-2">📊</div>
        <div class="fw-semibold">Phân tích</div>
      </a>
    </div>
    {% endif %}
</div>
