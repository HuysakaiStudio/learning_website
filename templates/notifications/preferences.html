{% extends 'base.html' %}
{% load static %}

{% block title %}Cài đặt thông báo{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/notifications.css' %}">
{% endblock %}

{% block content %}
<div class="container mt-4">
  <div class="row">
    <div class="col-md-8 mx-auto">
      <h2 class="mb-4">Cài đặt thông báo</h2>
      
      <form method="post">
        {% csrf_token %}
        
        <div class="card mb-4">
          <div class="card-header">
            <h5>Loại thông báo</h5>
          </div>
          <div class="card-body">
            <div class="form-check form-switch mb-3">
              <input class="form-check-input" type="checkbox" id="enable_badge" name="enable_badge" {% if prefs.enable_badge %}checked{% endif %}>
              <label class="form-check-label" for="enable_badge">Huy hiệu mới</label>
            </div>
            
            <div class="form-check form-switch mb-3">
              <input class="form-check-input" type="checkbox" id="enable_forum_reply" name="enable_forum_reply" {% if prefs.enable_forum_reply %}checked{% endif %}>
              <label class="form-check-label" for="enable_forum_reply">Trả lời diễn đàn</label>
            </div>
            
            <div class="form-check form-switch mb-3">
              <input class="form-check-input" type="checkbox" id="enable_leaderboard" name="enable_leaderboard" {% if prefs.enable_leaderboard %}checked{% endif %}>
              <label class="form-check-label" for="enable_leaderboard">Xếp hạng</label>
            </div>
            
            <div class="form-check form-switch mb-3">
              <input class="form-check-input" type="checkbox" id="enable_achievement" name="enable_achievement" {% if prefs.enable_achievement %}checked{% endif %}>
              <label class="form-check-label" for="enable_achievement">Thành tựu</label>
            </div>
            
            <div class="form-check form-switch mb-3">
              <input class="form-check-input" type="checkbox" id="enable_study_reminder" name="enable_study_reminder" {% if prefs.enable_study_reminder %}checked{% endif %}>
              <label class="form-check-label" for="enable_study_reminder">Nhắc nhở học tập</label>
            </div>
            
            <div class="form-check form-switch mb-3">
              <input class="form-check-input" type="checkbox" id="enable_exam_result" name="enable_exam_result" {% if prefs.enable_exam_result %}checked{% endif %}>
              <label class="form-check-label" for="enable_exam_result">Kết quả thi</label>
            </div>
            
            <div class="form-check form-switch mb-3">
              <input class="form-check-input" type="checkbox" id="enable_flashcard_milestone" name="enable_flashcard_milestone" {% if prefs.enable_flashcard_milestone %}checked{% endif %}>
              <label class="form-check-label" for="enable_flashcard_milestone">Cột mốc flashcard</label>
            </div>
            
            <div class="form-check form-switch mb-3">
              <input class="form-check-input" type="checkbox" id="enable_system" name="enable_system" {% if prefs.enable_system %}checked{% endif %}>
              <label class="form-check-label" for="enable_system">Hệ thống</label>
            </div>
          </div>
        </div>
        
        <div class="card mb-4">
          <div class="card-header">
            <h5>Thông báo qua email</h5>
          </div>
          <div class="card-body">
            <div class="form-check form-switch mb-3">
              <input class="form-check-input" type="checkbox" id="email_notifications" name="email_notifications" {% if prefs.email_notifications %}checked{% endif %}>
              <label class="form-check-label" for="email_notifications">Gửi email thông báo</label>
            </div>
            
            <div class="mb-3">
              <label for="email_frequency" class="form-label">Tần suất gửi email</label>
              <select class="form-select" id="email_frequency" name="email_frequency">
                <option value="instant" {% if prefs.email_frequency == 'instant' %}selected{% endif %}>Ngay lập tức</option>
                <option value="daily" {% if prefs.email_frequency == 'daily' %}selected{% endif %}>Hàng ngày</option>
                <option value="weekly" {% if prefs.email_frequency == 'weekly' %}selected{% endif %}>Hàng tuần</option>
                <option value="never" {% if prefs.email_frequency == 'never' %}selected{% endif %}>Không bao giờ</option>
              </select>
            </div>
          </div>
        </div>
        
        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
          <button type="submit" class="btn btn-primary">Lưu cài đặt</button>
          <a href="{% url 'notifications:list' %}" class="btn btn-outline-secondary">Quay lại</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
  // Add any specific notification preferences functionality here
});
</script>
{% endblock %}
