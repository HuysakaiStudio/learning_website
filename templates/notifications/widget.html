<!-- Notification Bell Widget - Include in base.html -->
<style>
  .notification-bell {
    position: relative;
    display: inline-block;
    cursor: pointer;
  }

  .notification-bell-icon {
    font-size: 24px;
    color: #666;
    transition: all 0.2s;
  }

  .notification-bell:hover .notification-bell-icon {
    color: #667eea;
    transform: scale(1.1);
  }

  .notification-badge {
    position: absolute;
    top: -8px;
    right: -8px;
    background: #ff4444;
    color: white;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% {
      transform: scale(1);
    }
    50% {
      transform: scale(1.1);
    }
  }

  .notification-dropdown {
    position: absolute;
    top: 100%;
    right: 0;
    margin-top: 8px;
    width: 360px;
    max-height: 480px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    display: none;
    z-index: 1000;
    overflow: hidden;
  }

  .notification-dropdown.show {
    display: block;
    animation: slideDown 0.2s ease-out;
  }

  @keyframes slideDown {
    from {
      opacity: 0;
      transform: translateY(-10px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .notification-dropdown-header {
    padding: 16px;
    border-bottom: 1px solid #f0f0f0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .notification-dropdown-title {
    font-size: 16px;
    font-weight: 600;
    color: #333;
  }

  .notification-dropdown-actions {
    display: flex;
    gap: 8px;
  }

  .notification-dropdown-btn {
    padding: 4px 8px;
    border: none;
    background: transparent;
    color: #667eea;
    font-size: 12px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
  }

  .notification-dropdown-btn:hover {
    background: #f0f0f0;
  }

  .notification-dropdown-list {
    max-height: 400px;
    overflow-y: auto;
  }

  .notification-dropdown-item {
    padding: 12px 16px;
    border-bottom: 1px solid #f8f8f8;
    cursor: pointer;
    transition: all 0.2s;
  }

  .notification-dropdown-item:hover {
    background: #f8f9fa;
  }

  .notification-dropdown-item.unread {
    background: #f0f7ff;
  }

  .notification-item-header {
    display: flex;
    gap: 8px;
    margin-bottom: 4px;
  }

  .notification-item-icon {
    font-size: 20px;
  }

  .notification-item-content {
    flex: 1;
  }

  .notification-item-title {
    font-size: 14px;
    font-weight: 600;
    color: #333;
    margin: 0 0 2px 0;
  }

  .notification-item-message {
    font-size: 12px;
    color: #666;
    margin: 0 0 4px 0;
  }

  .notification-item-time {
    font-size: 11px;
    color: #999;
  }

  .notification-dropdown-footer {
    padding: 12px 16px;
    border-top: 1px solid #f0f0f0;
    text-align: center;
  }

  .notification-view-all {
    color: #667eea;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
  }

  .notification-view-all:hover {
    text-decoration: underline;
  }

  .notification-empty {
    padding: 32px 16px;
    text-align: center;
    color: #999;
  }

  .notification-empty-icon {
    font-size: 48px;
    margin-bottom: 8px;
  }

  @media (max-width: 768px) {
    .notification-dropdown {
      width: 320px;
      right: -50px;
    }
  }

  /* Dark mode styles for notification widget */
  body.dark-mode .notification-bell-icon {
    color: var(--dm-text-secondary);
  }

  body.dark-mode .notification-bell:hover .notification-bell-icon {
    color: var(--dm-primary);
  }

  body.dark-mode .notification-dropdown {
    background: var(--dm-bg-card);
    box-shadow: 0 8px 24px var(--dm-shadow);
  }

  body.dark-mode .notification-dropdown-header {
    border-bottom: 1px solid var(--dm-border);
  }

  body.dark-mode .notification-dropdown-title {
    color: var(--dm-text-primary);
  }

  body.dark-mode .notification-dropdown-btn {
    color: var(--dm-primary);
  }

  body.dark-mode .notification-dropdown-btn:hover {
    background: var(--dm-bg-hover);
  }

  body.dark-mode .notification-dropdown-item {
    border-bottom: 1px solid var(--dm-border);
  }

  body.dark-mode .notification-dropdown-item:hover {
    background: var(--dm-bg-hover);
  }

  body.dark-mode .notification-dropdown-item.unread {
    background: rgba(59, 130, 246, 0.1);
  }

  body.dark-mode .notification-item-title {
    color: var(--dm-text-primary);
  }

  body.dark-mode .notification-item-message {
    color: var(--dm-text-secondary);
  }

  body.dark-mode .notification-item-time {
    color: var(--dm-text-tertiary);
  }

  body.dark-mode .notification-empty {
    color: var(--dm-text-tertiary);
  }

  body.dark-mode .notification-view-all {
    color: var(--dm-primary);
  }

  body.dark-mode .notification-dropdown-footer {
    border-top: 1px solid var(--dm-border);
  }
</style>

{% if user.is_authenticated %}
<div class="notification-bell" id="notificationBell">
  <span class="notification-bell-icon">🔔</span>
  <span class="notification-badge" id="notificationBadge" style="display: none;">0</span>
  
  <div class="notification-dropdown" id="notificationDropdown">
    <div class="notification-dropdown-header">
      <span class="notification-dropdown-title">Thông báo</span>
      <div class="notification-dropdown-actions">
        <button class="notification-dropdown-btn" onclick="markAllAsRead()">Đọc hết</button>
        <button class="notification-dropdown-btn" onclick="closeNotifications()">✕</button>
      </div>
    </div>
    
    <div class="notification-dropdown-list" id="notificationList">
      <div class="notification-empty">
        <div class="notification-empty-icon">🔔</div>
        <div>Đang tải...</div>
      </div>
    </div>
    
    <div class="notification-dropdown-footer">
      <a href="{% url 'notifications:list' %}" class="notification-view-all">Xem tất cả thông báo</a>
    </div>
  </div>
</div>

<script>
// Improved Notification Bell Widget with error handling
document.addEventListener('DOMContentLoaded', function() {
  // Check if elements exist before initializing
  const bell = document.getElementById('notificationBell');
  const dropdown = document.getElementById('notificationDropdown');
  const badge = document.getElementById('notificationBadge');
  const list = document.getElementById('notificationList');

  // Exit early if required elements are not found
  if (!bell || !dropdown || !badge || !list) {
    console.warn('Notification widget: Required elements not found');
    return;
  }

  // Check if already initialized to prevent duplicate event listeners
  if (bell.dataset.notificationInitialized === 'true') {
    return;
  }
  bell.dataset.notificationInitialized = 'true';

  // Toggle dropdown with proper error handling
  bell.addEventListener('click', function(e) {
    try {
      e.stopPropagation();
      // Check if dropdown is already visible, if so, hide it
      if (dropdown.classList.contains('show')) {
        dropdown.classList.remove('show');
      } else {
        dropdown.classList.add('show');
        loadNotifications();
      }
    } catch (error) {
      console.error('Error toggling notification dropdown:', error);
    }
  });
  
  // Close when clicking outside with error handling
  document.addEventListener('click', function(e) {
    try {
      if (!bell.contains(e.target)) {
        dropdown.classList.remove('show');
      }
    } catch (error) {
      console.error('Error handling outside click:', error);
    }
  });
  
  // Load notifications with error handling
  function loadNotifications() {
    try {
      fetch('{% url "notifications:api_recent" %}')
        .then(response => {
          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }
          return response.json();
        })
        .then(data => {
          if (data && data.notifications && Array.isArray(data.notifications)) {
            if (data.notifications.length === 0) {
              list.innerHTML = `
                <div class="notification-empty">
                  <div class="notification-empty-icon">🔔</div>
                  <div>Không có thông báo mới</div>
                </div>
              `;
            } else {
              list.innerHTML = data.notifications.map(notif => `
                <div class="notification-dropdown-item ${notif.is_read ? '' : 'unread'}"
                     onclick="handleNotificationClick('${notif.action_url || ''}', ${notif.id})">
                  <div class="notification-item-header">
                    <span class="notification-item-icon">${getNotificationIcon(notif.type)}</span>
                    <div class="notification-item-content">
                      <div class="notification-item-title">${notif.title || 'Thông báo'}</div>
                      <div class="notification-item-message">${notif.message || ''}</div>
                      <div class="notification-item-time">${formatTime(notif.created_at)}</div>
                    </div>
                  </div>
                </div>
              `).join('');
            }
          } else {
            list.innerHTML = `
              <div class="notification-empty">
                <div>Không có dữ liệu thông báo</div>
              </div>
            `;
          }
        })
        .catch(error => {
          console.error('Error loading notifications:', error);
          list.innerHTML = `
            <div class="notification-empty">
              <div>Lỗi tải thông báo</div>
            </div>
          `;
        });
    } catch (error) {
      console.error('Error in loadNotifications function:', error);
      list.innerHTML = `
        <div class="notification-empty">
          <div>Lỗi hệ thống</div>
        </div>
      `;
    }
  }
  
  // Update unread count with error handling
  function updateUnreadCount() {
    try {
      fetch('{% url "notifications:api_unread_count" %}')
        .then(response => {
          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }
          return response.json();
        })
        .then(data => {
          if (data && typeof data.count === 'number') {
            if (data.count > 0) {
              badge.textContent = data.count > 99 ? '99+' : data.count;
              badge.style.display = 'flex';
            } else {
              badge.style.display = 'none';
            }
          }
        })
        .catch(error => console.error('Error updating count:', error));
    } catch (error) {
      console.error('Error in updateUnreadCount function:', error);
    }
  }
  
  // Handle notification click with error handling
  window.handleNotificationClick = function(url, id) {
    try {
      // Mark as read
      fetch(`/notifications/${id}/read/`, {
        method: 'POST',
        headers: {
          'X-CSRFToken': getCookie('csrftoken'),
          'X-Requested-With': 'XMLHttpRequest'
        }
      }).then(response => {
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        return response.json();
      }).then(() => {
        updateUnreadCount();
        if (url) {
          window.location.href = url;
        }
      }).catch(error => {
        console.error('Error marking notification as read:', error);
        // Still update the count in case the request succeeded but response had issues
        updateUnreadCount();
        if (url) {
          window.location.href = url;
        }
      });
    } catch (error) {
      console.error('Error in handleNotificationClick:', error);
    }
  };
  
  // Mark all as read with error handling
  window.markAllAsRead = function() {
    try {
      fetch('{% url "notifications:mark_all_as_read" %}', {
        method: 'POST',
        headers: {
          'X-CSRFToken': getCookie('csrftoken'),
          'X-Requested-With': 'XMLHttpRequest'
        }
      }).then(response => {
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        return response.json();
      }).then(() => {
        updateUnreadCount();
        loadNotifications();
      }).catch(error => {
        console.error('Error marking all as read:', error);
        // Still try to update the UI in case the request succeeded but response had issues
        updateUnreadCount();
        loadNotifications();
      });
    } catch (error) {
      console.error('Error in markAllAsRead:', error);
    }
  };
  
  // Close dropdown with error handling
  window.closeNotifications = function() {
    try {
      dropdown.classList.remove('show');
    } catch (error) {
      console.error('Error closing notifications:', error);
    }
  };
  
  // Get notification icon with error handling
  function getNotificationIcon(type) {
    try {
      const icons = {
        'achievement': '🏆',
        'leaderboard': '📊',
        'exam_result': '📝',
        'forum_reply': '💬',
        'flashcard_milestone': '⭐',
        'study_reminder': '📚',
        'badge': '🎖️',
        'system': '🔔'
      };
      return icons[type] || '🔔';
    } catch (error) {
      console.error('Error getting notification icon:', error);
      return '🔔';
    }
  }
  
  // Format time with error handling
  function formatTime(isoString) {
    try {
      const date = new Date(isoString);
      const now = new Date();
      const diff = Math.floor((now - date) / 1000); // seconds

      if (isNaN(date.getTime())) {
        return 'Không rõ thời gian';
      }

      if (diff < 60) return 'Vừa xong';
      if (diff < 3600) return Math.floor(diff / 60) + ' phút trước';
      if (diff < 86400) return Math.floor(diff / 3600) + ' giờ trước';
      if (diff < 604800) return Math.floor(diff / 86400) + ' ngày trước';
      return date.toLocaleDateString('vi-VN');
    } catch (error) {
      console.error('Error formatting time:', error);
      return 'Không rõ';
    }
  }
  
  // Get CSRF token with error handling
  function getCookie(name) {
    try {
      let cookieValue = null;
      if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
          const cookie = cookies[i].trim();
          if (cookie.substring(0, name.length + 1) === (name + '=')) {
            cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
            break;
          }
        }
      }
      return cookieValue;
    } catch (error) {
      console.error('Error getting cookie:', error);
      return null;
    }
  }
  
  // Initial load and periodic refresh with error handling
  try {
    updateUnreadCount();
    // Refresh every 30 seconds
    const intervalId = setInterval(updateUnreadCount, 30000);
    
    // Clear interval when page is unloaded to prevent memory leaks
    window.addEventListener('beforeunload', function() {
      if (intervalId) {
        clearInterval(intervalId);
      }
    });
  } catch (error) {
    console.error('Error in initialization:', error);
  }
});
</script>
{% endif %}
